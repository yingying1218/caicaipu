
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>菜菜谱 · 厨房小白的私房菜</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E8%8F%9C%E8%8F%9C%E8%B0%B1%22%2C%22short_name%22%3A%22%E8%8F%9C%E8%8F%9C%E8%B0%B1%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f9f3e9%22%2C%22theme_color%22%3A%22%23a77c52%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'48'%20fill%3D'%23a77c52'%2F%3E%3Ctext%20x%3D'50'%20y%3D'68'%20font-size%3D'52'%20text-anchor%3D'middle'%20fill%3D'white'%3E🍲%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="菜菜谱">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23a77c52'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white'>🍲</text></svg>">
  <meta name="theme-color" content="#a77c52">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f9f3e9; font-family: 'Segoe UI', 'Noto Serif SC', '楷体', KaiTi, '华文楷体', STKaiti, Georgia, serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 1.5rem 1rem; color: #4a3b2f; }
    .app-container { max-width: 1100px; width: 100%; background: rgba(255,251,245,0.9); backdrop-filter: blur(16px); border-radius: 3rem; box-shadow: 0 25px 45px rgba(0,0,0,0.1); padding: 2rem 1.8rem; display: flex; flex-direction: column; gap: 2rem; }
    h1 { text-align: center; font-size: 2.8rem; font-weight: 400; letter-spacing: 6px; color: #5e3e1c; border-bottom: 2px dashed #d9b382; padding-bottom: 0.5rem; }
    .welcome-msg { text-align: center; font-size: 1.2rem; color: #7b5e3b; margin-top: -1rem; font-style: italic; }
    .menu-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
    .menu-card { background: #fff7ed; flex: 1 1 150px; border-radius: 2.5rem; padding: 2rem 1rem; text-align: center; cursor: pointer; border: 1px solid #ecdcc0; transition: 0.2s; }
    .menu-card:hover { transform: translateY(-5px); background: #faead7; }
    .menu-icon { font-size: 2.8rem; background: #f7ede0; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .view { display: none; flex-direction: column; gap: 1.8rem; }
    .view.active { display: flex; }
    .back-btn { background: none; border: 1px solid #c8a27a; color: #5e3e1c; padding: 0.5rem 1.2rem; border-radius: 3rem; cursor: pointer; align-self: flex-start; }
    .recipe-form { background: #fffaf2; padding: 1.8rem; border-radius: 2rem; border: 1px solid #eddcc9; display: flex; flex-direction: column; gap: 1.4rem; }
    input, textarea { background: #fefcf7; border: 1px solid #d6b690; border-radius: 1.2rem; padding: 0.8rem; font-family: inherit; }
    .btn { background: #a77c52; color: white; border: none; padding: 0.7rem 1.8rem; border-radius: 2.5rem; cursor: pointer; font-weight: bold; }
    .btn-outline { background: transparent; color: #5e3e1c; border: 1px solid #b1895c; }
    .btn-danger { background: #c47a5a; }
    .recipe-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .recipe-item { background: #fff6ea; border-radius: 1.5rem; padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e1c7a8; }
    .book-spread { display: flex; flex-wrap: wrap; background: #fef7e9; border-radius: 2rem; }
    .left-page, .right-page { flex: 1 1 280px; padding: 2rem; }
    .left-page { background: #fdf3e4; border-right: 1px dashed #c9aa7a; }
    .dir-link { background: none; border: none; color: #5e3e1c; text-decoration: underline; cursor: pointer; }
    .post-card { background: #fffaf2; border-radius: 1.8rem; padding: 1.5rem; border: 1px solid #e2cfb0; }
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f3e9; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .login-box { background: white; padding: 2.5rem; border-radius: 3rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-width: 360px; width: 90%; }
    .media-preview img { max-width: 140px; border-radius: 1rem; border: 2px solid #d9b382; }
    .cover-preview { max-width: 160px; border-radius: 1rem; border: 2px solid #d9b382; }
  </style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <h2>🍲 菜菜谱</h2>
    <p>登录后数据自动云端同步</p>
    <input id="loginIdInput" placeholder="账号" style="width:100%; margin:0.5rem 0;"><br>
    <input id="loginPwInput" type="password" placeholder="密码（8位数字）" style="width:100%; margin:0.5rem 0;"><br>
    <button class="btn" id="loginGoBtn" style="width:100%;">登录</button>
    <button class="btn-outline" id="regGoBtn" style="width:100%; margin-top:0.5rem;">注册新账号</button>
    <p style="margin-top:1rem; font-size:0.8rem; color:#8b6b4b;">多设备自动同步 · 数据云端存储</p>
  </div>
</div>

<div class="app-container" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>🍲 菜菜谱</h1>
    <button class="btn-outline" id="logoutBtn">🚪 退出</button>
  </div>
  <p class="welcome-msg">叮～你的线上小厨房已上线！菜菜谱，专治“只会烧开水”的你。</p>

  <div id="mainMenu" class="view active">
    <div class="menu-grid">
      <div class="menu-card" data-view="uploadView"><div class="menu-icon">📤</div><span>上传菜谱</span></div>
      <div class="menu-card" data-view="editView"><div class="menu-icon">✏️</div><span>修改菜谱</span></div>
      <div class="menu-card" data-view="bookView"><div class="menu-icon">📖</div><span>查看菜谱</span></div>
      <div class="menu-card" data-view="communityView"><div class="menu-icon">🌍</div><span>共享社区</span></div>
    </div>
  </div>

  <div id="uploadView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="recipe-form">
      <h2>📥 新建菜谱</h2>
      <div><label>🏷️ 标题 (15字以内)</label><input id="uploadTitle" maxlength="15"></div>
      <div><label>📝 文字描述</label><textarea id="uploadText" rows="3"></textarea></div>
      <div><label>🖼️ 图片 (≤5MB)</label><input type="file" id="uploadImage" accept="image/*"><div id="imagePreview" class="media-preview"></div></div>
      <div><label>🔗 视频链接</label><input id="uploadVideoLink"></div>
      <div style="display:flex; gap:1rem;"><button class="btn" id="saveRecipeBtn">💾 保存</button><button class="btn" id="saveUploadAndBackBtn">📤 保存并返回</button></div>
    </div>
  </div>

  <div id="editView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <h2>✏️ 修改菜谱</h2>
    <div id="editRecipeList" class="recipe-list"></div>
    <div id="editFormArea" style="display:none;"><div class="recipe-form">
      <input type="hidden" id="editIndex"><div><label>标题</label><input id="editTitle" maxlength="15"></div>
      <div><label>文字</label><textarea id="editText"></textarea></div>
      <div><label>更换图片 (≤5MB)</label><input type="file" id="editImage" accept="image/*"></div>
      <div><label>视频链接</label><input id="editVideoLink"></div>
      <div id="editMediaPreview" class="media-preview"></div>
      <div style="display:flex; gap:1rem;"><button class="btn" id="saveEditBtn">💾 保存</button><button class="btn" id="saveEditAndBackBtn">📤 保存并返回</button></div>
    </div></div>
  </div>

  <div id="bookView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="book-spread"><div class="left-page">
      <div style="display:flex; justify-content:space-between;"><span>📚 目录</span><label class="btn-outline" style="cursor:pointer;">🖼️封面 (≤5MB)<input type="file" id="coverImageInput" accept="image/*" style="display:none;"></label></div>
      <img id="coverPreviewImg" class="cover-preview" style="display:none;"><ul id="directoryList"></ul>
      <button class="btn-outline" id="saveCoverBtn">💾 保存封面</button>
    </div><div class="right-page" id="recipeDetailPage"></div></div>
  </div>

  <div id="communityView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div><span id="communityUserStatus">👤 未登录</span></div>
    <div class="recipe-form">
      <h3>📢 分享到社区</h3>
      <input id="communityTitle" placeholder="标题" maxlength="15"><textarea id="communityText"></textarea>
      <div><label>图片 (≤5MB)</label><input type="file" id="communityImage" accept="image/*"></div>
      <button class="btn" id="postToCommunityBtn">发布</button>
    </div>
    <div id="communityFeed"></div>
  </div>
</div>

<script>
 // ========== 替换为你的 Supabase URL 和 anon key ==========
const SUPABASE_URL = 'https://ejttehxitubitkbtmjwf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdHRlaHhpdHViaXRrYnRtandmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Njk1MjQsImV4cCI6MjA5NzU0NTUyNH0.KWQnhMzHYhiOmjwArtDM1HhC4N9siQeJFZk3OnnbJEc';
// =========================================================

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let recipes = [];
  let communityPosts = [];
  let coverImageData = null;

  // 工具函数
  function fileToBase64(file, maxMB = 5) {
    return new Promise((resolve, reject) => {
      if (file.size > maxMB * 1024 * 1024) { alert(`图片不能超过${maxMB}MB`); return reject('文件过大'); }
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function escapeHtml(t) { return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

  // 云端数据加载
  async function loadCloudData() {
    if (!currentUser) return;
    // 菜谱
    const { data: recipeData } = await db.from('recipes').select('*').eq('user_id', currentUser.id);
    recipes = recipeData.map(r => ({ id: r.id, title: r.title, text: r.text, image: r.image, video_link: r.video_link }));
    // 封面
    const { data: coverData } = await db.from('covers').select('image').eq('user_id', currentUser.id).maybeSingle();
    coverImageData = coverData?.image || null;
    // 社区帖子
    await loadCommunityPosts();
    renderEditList(); renderBook(); updateCommunityUI();
  }

  async function saveRecipe(recipe, id = null) {
    const payload = { user_id: currentUser.id, title: recipe.title, text: recipe.text, image: recipe.image, video_link: recipe.videoLink };
    if (id) {
      const { error } = await db.from('recipes').update(payload).eq('id', id);
      if (error) throw error;
    } else {
      const { data, error } = await db.from('recipes').insert(payload).select();
      if (error) throw error;
      return data[0].id;
    }
  }

  async function deleteRecipe(id) {
    await db.from('recipes').delete().eq('id', id);
  }

  async function saveCoverToCloud() {
    const { data } = await db.from('covers').select('id').eq('user_id', currentUser.id).maybeSingle();
    if (data) {
      await db.from('covers').update({ image: coverImageData }).eq('id', data.id);
    } else {
      await db.from('covers').insert({ user_id: currentUser.id, image: coverImageData });
    }
  }

  async function loadCommunityPosts() {
    const { data } = await db.from('community_posts').select('*').order('created_at', { ascending: false }).limit(50);
    communityPosts = data.map(p => ({
      id: p.id,
      author: p.author,
      title: p.title,
      text: p.text,
      image: p.image,
      likes: p.likes || [],
      created_at: p.created_at
    }));
  }

  async function addCommunityPost(post) {
    const { data, error } = await db.from('community_posts').insert({
      author: post.author,
      title: post.title,
      text: post.text,
      image: post.image,
      likes: []
    }).select();
    if (error) throw error;
    return data[0].id;
  }

  async function updateLikes(postId, likes) {
    await db.from('community_posts').update({ likes }).eq('id', postId);
  }

  // 登录逻辑
  const loginScreen = document.getElementById('loginScreen');
  const appContainer = document.querySelector('.app-container');

  async function login(id, pw) {
    const { data: users } = await db.from('users').select('*').eq('username', id);
    if (!users || users.length === 0) throw new Error('账号不存在');
    if (users[0].password !== pw) throw new Error('密码错误');
    currentUser = { id: users[0].username, objectId: users[0].id };
    localStorage.setItem('currentUser', JSON.stringify({ id, pw, expire: Date.now() + 7*24*3600*1000 }));
    await loadCloudData();
    updateLoginUI();
  }

  async function register(id, pw) {
    const { data: existing } = await db.from('users').select('id').eq('username', id);
    if (existing && existing.length > 0) throw new Error('账号已存在');
    const { error } = await db.from('users').insert({ username: id, password: pw });
    if (error) throw error;
    alert('注册成功，请登录');
  }

  document.getElementById('loginGoBtn').addEventListener('click', async () => {
    const id = document.getElementById('loginIdInput').value.trim();
    const pw = document.getElementById('loginPwInput').value.trim();
    if (!id || !pw) return alert('请输入完整');
    if (!/^\d{8}$/.test(pw)) return alert('密码需8位数字');
    try { await login(id, pw); } catch(e) { alert(e.message); }
  });
  document.getElementById('regGoBtn').addEventListener('click', async () => {
    const id = document.getElementById('loginIdInput').value.trim();
    const pw = document.getElementById('loginPwInput').value.trim();
    if (!id || !pw) return alert('请输入');
    if (!/^\d{8}$/.test(pw)) return alert('密码需8位数字');
    try { await register(id, pw); } catch(e) { alert(e.message); }
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('currentUser');
    currentUser = null;
    updateLoginUI();
  });

  function updateLoginUI() {
    if (currentUser) {
      loginScreen.style.display = 'none';
      appContainer.style.display = '';
      document.getElementById('communityUserStatus').textContent = `👤 ${currentUser.id}`;
    } else {
      loginScreen.style.display = 'flex';
      appContainer.style.display = 'none';
    }
  }

  // 视图切换
  const views = {
    mainMenu: document.getElementById('mainMenu'),
    uploadView: document.getElementById('uploadView'),
    editView: document.getElementById('editView'),
    bookView: document.getElementById('bookView'),
    communityView: document.getElementById('communityView')
  };
  function showView(id) { Object.values(views).forEach(v => v.classList.remove('active')); if (views[id]) views[id].classList.add('active'); }
  document.querySelectorAll('.menu-card').forEach(c => c.addEventListener('click', () => showView(c.dataset.view)));
  document.querySelectorAll('.back-btn').forEach(b => b.addEventListener('click', () => showView('mainMenu')));

  // 上传菜谱
  const uploadTitle = document.getElementById('uploadTitle'), uploadText = document.getElementById('uploadText');
  const uploadImage = document.getElementById('uploadImage'), uploadVideoLink = document.getElementById('uploadVideoLink');
  uploadImage.addEventListener('change', function() {
    document.getElementById('imagePreview').innerHTML = this.files?.[0] ? `<img src="${URL.createObjectURL(this.files[0])}">` : '';
  });
  async function uploadAndSave(back = false) {
    const title = uploadTitle.value.trim(); if (!title || title.length>15) return alert('标题1-15字');
    let image = null;
    if (uploadImage.files?.[0]) { try { image = await fileToBase64(uploadImage.files[0], 5); } catch(e) { return; } }
    const recipe = { title, text: uploadText.value.trim(), image, videoLink: uploadVideoLink.value.trim() };
    const newId = await saveRecipe(recipe);
    recipe.id = newId;
    recipes.push(recipe);
    renderEditList(); renderBook();
    if (back) showView('mainMenu'); else alert('已保存');
  }
  document.getElementById('saveRecipeBtn').addEventListener('click', () => uploadAndSave(false));
  document.getElementById('saveUploadAndBackBtn').addEventListener('click', () => uploadAndSave(true));

  // 修改菜谱
  const editList = document.getElementById('editRecipeList'), editForm = document.getElementById('editFormArea');
  const editIndex = document.getElementById('editIndex'), editTitle = document.getElementById('editTitle'), editText = document.getElementById('editText');
  const editImage = document.getElementById('editImage'), editVideoLink = document.getElementById('editVideoLink');
  function renderEditList() {
    editList.innerHTML = recipes.length ? '' : '<p>暂无菜谱</p>';
    recipes.forEach((r, i) => {
      const d = document.createElement('div'); d.className = 'recipe-item';
      d.innerHTML = `<span>${escapeHtml(r.title)}</span><div><button data-edit="${i}" class="btn-outline">✎</button><button data-del="${i}" class="btn-outline btn-danger">🗑</button></div>`;
      editList.appendChild(d);
    });
    document.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', e => loadEdit(parseInt(b.dataset.edit))));
    document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async e => {
      const i = parseInt(b.dataset.del);
      if (confirm('确定删除？')) { await deleteRecipe(recipes[i].id); recipes.splice(i,1); renderEditList(); renderBook(); }
    }));
  }
  function loadEdit(i) {
    const r = recipes[i]; editIndex.value = i; editTitle.value = r.title; editText.value = r.text; editVideoLink.value = r.video_link||'';
    document.getElementById('editMediaPreview').innerHTML = r.image ? `<img src="${r.image}">` : '';
    editForm.style.display = 'block';
  }
  editImage.addEventListener('change', function() {
    if (this.files?.[0]) { const reader = new FileReader(); reader.onload = e => document.getElementById('editMediaPreview').innerHTML = `<img src="${e.target.result}">`; reader.readAsDataURL(this.files[0]); }
  });
  async function saveEdit(back = false) {
    const i = parseInt(editIndex.value); if (isNaN(i)) return;
    const r = recipes[i]; r.title = editTitle.value.trim(); r.text = editText.value.trim(); r.videoLink = editVideoLink.value.trim();
    if (editImage.files?.[0]) { try { r.image = await fileToBase64(editImage.files[0],5); } catch(e){ return; } }
    await saveRecipe(r, r.id);
    renderEditList(); renderBook(); editForm.style.display = 'none';
    if (back) showView('mainMenu');
  }
  document.getElementById('saveEditBtn').addEventListener('click', () => saveEdit(false));
  document.getElementById('saveEditAndBackBtn').addEventListener('click', () => saveEdit(true));

  // 书视图
  const coverImg = document.getElementById('coverPreviewImg'), coverInput = document.getElementById('coverImageInput');
  function updateCoverDisplay() { if (coverImageData) { coverImg.src = coverImageData; coverImg.style.display = 'block'; } else coverImg.style.display = 'none'; }
  coverInput.addEventListener('change', async function() { if (this.files?.[0]) { coverImageData = await fileToBase64(this.files[0],5); updateCoverDisplay(); } });
  document.getElementById('saveCoverBtn').addEventListener('click', async () => { await saveCoverToCloud(); alert('封面已保存'); });
  function renderBook() {
    document.getElementById('directoryList').innerHTML = '';
    if (!recipes.length) { document.getElementById('recipeDetailPage').innerHTML = '<p>暂无菜谱</p>'; return; }
    recipes.forEach((r,i) => {
      const li = document.createElement('li'); const b = document.createElement('button'); b.className='dir-link'; b.textContent=r.title;
      b.onclick = () => showDetail(i); li.appendChild(b); document.getElementById('directoryList').appendChild(li);
    });
    showDetail(0);
  }
  function showDetail(i) {
    const r = recipes[i];
    document.getElementById('recipeDetailPage').innerHTML = `<h2>${escapeHtml(r.title)}</h2><p>${escapeHtml(r.text||'')}</p>${r.image?`<img src="${r.image}" style="max-width:100%">`:''}${r.videoLink?`<a href="${r.videoLink}" target="_blank">视频链接</a>`:''}`;
  }

  // 社区
  async function updateCommunityUI() {
    document.getElementById('communityUserStatus').textContent = currentUser ? `👤 ${currentUser.id}` : '未登录';
    await loadCommunityPosts();
    renderCommunityFeed();
  }
  document.getElementById('postToCommunityBtn').addEventListener('click', async () => {
    if (!currentUser) return alert('请登录');
    const title = document.getElementById('communityTitle').value.trim(); if (!title || title.length>15) return alert('标题1-15字');
    let image = null;
    const imgFile = document.getElementById('communityImage').files?.[0];
    if (imgFile) { try { image = await fileToBase64(imgFile,5); } catch(e) { return; } }
    const post = { author: currentUser.id, title, text: document.getElementById('communityText').value.trim(), image };
    const newId = await addCommunityPost(post);
    post.id = newId;
    post.likes = [];
    communityPosts.unshift(post);
    renderCommunityFeed();
    document.getElementById('communityTitle').value = ''; document.getElementById('communityText').value = ''; document.getElementById('communityImage').value = '';
  });
  function renderCommunityFeed() {
    const feed = document.getElementById('communityFeed'); feed.innerHTML = communityPosts.length ? '' : '<p>暂无分享</p>';
    communityPosts.forEach(p => {
      const liked = currentUser && p.likes.includes(currentUser.id);
      const card = document.createElement('div'); card.className = 'post-card';
      card.innerHTML = `<strong>${escapeHtml(p.title)}</strong> by ${escapeHtml(p.author)}<p>${escapeHtml(p.text)}</p>${p.image?`<img src="${p.image}" style="max-width:100%">`:''}
        <div><button class="like-btn">${liked?'❤️':'🤍'} ${p.likes.length}</button><button class="btn-outline download-btn">📥下载</button></div>`;
      card.querySelector('.like-btn').addEventListener('click', async () => {
        if (!currentUser) return alert('请登录');
        if (p.likes.includes(currentUser.id)) p.likes = p.likes.filter(u => u!==currentUser.id);
        else p.likes.push(currentUser.id);
        await updateLikes(p.id, p.likes);
        renderCommunityFeed();
      });
      card.querySelector('.download-btn').addEventListener('click', async () => {
        const r = { title: p.title, text: p.text, image: p.image, videoLink: '' };
        const newId = await saveRecipe(r);
        r.id = newId;
        recipes.push(r);
        renderEditList(); renderBook();
        alert('已下载到我的菜谱');
      });
      feed.appendChild(card);
    });
  }

  // 自动创建表（首次使用需要）
  async function initTables() {
    try {
      await db.from('users').select('id').limit(1);
    } catch (e) {
      // 表不存在时需手动创建，这里提示用户去 Supabase 控制台执行 SQL
      alert('请先在 Supabase 控制台 → SQL Editor 中运行以下建表语句：\n' +
        'CREATE TABLE users (id SERIAL PRIMARY KEY, username TEXT UNIQUE, password TEXT);\n' +
        'CREATE TABLE recipes (id SERIAL PRIMARY KEY, user_id TEXT, title TEXT, text TEXT, image TEXT, video_link TEXT);\n' +
        'CREATE TABLE covers (id SERIAL PRIMARY KEY, user_id TEXT UNIQUE, image TEXT);\n' +
        'CREATE TABLE community_posts (id SERIAL PRIMARY KEY, author TEXT, title TEXT, text TEXT, image TEXT, likes TEXT[] DEFAULT ARRAY[]::TEXT[], created_at TIMESTAMPTZ DEFAULT NOW());');
    }
  }

  (async () => {
    await initTables();
    const saved = localStorage.getItem('currentUser');
    if (saved) {
      const s = JSON.parse(saved);
      if (s.expire > Date.now()) {
        try { await login(s.id, s.pw); } catch(e) { localStorage.removeItem('currentUser'); updateLoginUI(); }
      } else localStorage.removeItem('currentUser');
    }
    updateLoginUI();
  })();
</script>
</body>
