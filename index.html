<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>菜菜谱 · 厨房小白的私房菜</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E8%8F%9C%E8%8F%9C%E8%B0%B1%22%2C%22short_name%22%3A%22%E8%8F%9C%E8%8F%9C%E8%B0%B1%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f9f3e9%22%2C%22theme_color%22%3A%22%23a77c52%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'48'%20fill%3D'%23a77c52'%2F%3E%3Ctext%20x%3D'50'%20y%3D'68'%20font-size%3D'52'%20text-anchor%3D'middle'%20fill%3D'white'%3E🍲%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="菜菜谱">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23a77c52'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white'>🍲</text></svg>">
  <meta name="theme-color" content="#a77c52">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f9f3e9;
      font-family: 'Segoe UI', 'Noto Serif SC', '楷体', KaiTi, '华文楷体', STKaiti, Georgia, serif;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      min-height: 100vh; padding: 1.5rem 1rem; color: #4a3b2f;
    }
    .app-container {
      max-width: 1100px; width: 100%; background: rgba(255,251,245,0.9);
      backdrop-filter: blur(16px); border-radius: 3rem; box-shadow: 0 25px 45px rgba(0,0,0,0.1);
      padding: 2rem 1.8rem; display: flex; flex-direction: column; gap: 2rem;
      position: relative;
    }
    h1 { text-align: center; font-size: 2.8rem; font-weight: 400; letter-spacing: 6px; color: #5e3e1c; border-bottom: 2px dashed #d9b382; padding-bottom: 0.5rem; }
    .welcome-msg { text-align: center; font-size: 1.2rem; color: #7b5e3b; margin-top: -1rem; font-style: italic; }
    .menu-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
    .menu-card {
      background: #fff7ed; flex: 1 1 150px; min-width: 130px; border-radius: 2.5rem;
      padding: 2rem 1rem; text-align: center; cursor: pointer; border: 1px solid #ecdcc0;
      transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
    }
    .menu-card:hover { transform: translateY(-5px); background: #faead7; }
    .menu-icon { font-size: 2.8rem; background: #f7ede0; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .view { display: none; flex-direction: column; gap: 1.8rem; }
    .view.active { display: flex; }
    .back-btn { background: none; border: 1px solid #c8a27a; color: #5e3e1c; padding: 0.5rem 1.2rem; border-radius: 3rem; cursor: pointer; align-self: flex-start; }
    .recipe-form, .community-box { background: #fffaf2; padding: 1.8rem; border-radius: 2rem; border: 1px solid #eddcc9; display: flex; flex-direction: column; gap: 1.4rem; }
    input, textarea { background: #fefcf7; border: 1px solid #d6b690; border-radius: 1.2rem; padding: 0.8rem; font-family: inherit; }
    .btn { background: #a77c52; color: white; border: none; padding: 0.7rem 1.8rem; border-radius: 2.5rem; cursor: pointer; font-weight: bold; }
    .btn-outline { background: transparent; color: #5e3e1c; border: 1px solid #b1895c; }
    .btn-danger { background: #c47a5a; }
    .recipe-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .recipe-item { background: #fff6ea; border-radius: 1.5rem; padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e1c7a8; }
    .book-spread { display: flex; flex-wrap: wrap; background: #fef7e9; border-radius: 2rem; }
    .left-page, .right-page { flex: 1 1 280px; padding: 2rem; }
    .left-page { background: #fdf3e4; border-right: 1px dashed #c9aa7a; }
    .dir-link { background: none; border: none; color: #5e3e1c; text-decoration: underline; cursor: pointer; }
    .auth-panel { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; background: #f5ede1; padding: 1.2rem; border-radius: 2rem; }
    .post-card { background: #fffaf2; border-radius: 1.8rem; padding: 1.5rem; border: 1px solid #e2cfb0; }
    .install-banner { background: #e7d5bd; padding: 0.8rem 1.5rem; border-radius: 2rem; text-align: center; cursor: pointer; display: none; margin-bottom: 1rem; }
    
    /* 登录界面 */
    #loginScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f9f3e9; display: flex; align-items: center; justify-content: center;
      z-index: 999; flex-direction: column;
    }
    .login-box {
      background: white; padding: 2.5rem; border-radius: 3rem; text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-width: 360px; width: 90%;
    }
    .media-preview img, .media-preview video { max-width: 140px; max-height: 100px; border-radius: 1rem; border: 2px solid #d9b382; }
    .cover-preview { max-width: 160px; max-height: 120px; border-radius: 1rem; border: 2px solid #d9b382; margin: 0.5rem 0; }
  </style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <h2>🍲 菜菜谱</h2>
    <p>登录后开启你的私房菜</p>
    <input id="loginIdInput" placeholder="账号" style="width:100%; margin:0.5rem 0;"><br>
    <input id="loginPwInput" type="password" placeholder="密码（8位数字）" style="width:100%; margin:0.5rem 0;"><br>
    <button class="btn" id="loginGoBtn" style="width:100%;">登录</button>
    <button class="btn-outline" id="regGoBtn" style="width:100%; margin-top:0.5rem;">注册新账号</button>
    <p style="margin-top:1rem; font-size:0.8rem; color:#8b6b4b;">数据保存在当前设备，登录后自动同步账户内容</p>
  </div>
</div>

<div class="app-container" style="display:none;">
  <div id="installBanner" class="install-banner">📲 点击安装菜菜谱到桌面，像App一样使用！</div>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>🍲 菜菜谱</h1>
    <button class="btn-outline" id="logoutBtn" style="padding:0.4rem 1.2rem;">🚪 退出</button>
  </div>
  <p class="welcome-msg">叮～你的线上小厨房已上线！菜菜谱，专治“只会烧开水”的你。</p>

  <div id="mainMenu" class="view active">
    <div class="menu-grid">
      <div class="menu-card" data-view="uploadView"><div class="menu-icon">📤</div><span>上传菜谱</span></div>
      <div class="menu-card" data-view="editView"><div class="menu-icon">✏️</div><span>修改菜谱</span></div>
      <div class="menu-card" data-view="bookView"><div class="menu-icon">📖</div><span>查看菜谱</span></div>
      <div class="menu-card" data-view="communityView"><div class="menu-icon">🌍</div><span>共享社区</span></div>
    </div>
  </div>

  <!-- 上传菜谱（无视频上传） -->
  <div id="uploadView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="recipe-form">
      <h2>📥 新建菜谱</h2>
      <div class="form-group"><label>🏷️ 标题 (15字以内)</label><input id="uploadTitle" maxlength="15" placeholder="外婆的红烧肉"></div>
      <div class="form-group"><label>📝 文字描述</label><textarea id="uploadText" rows="3"></textarea></div>
      <div class="form-group"><label>🖼️ 图片 (单张不超过5MB)</label><input type="file" id="uploadImage" accept="image/*"><div id="imagePreview" class="media-preview"></div></div>
      <div class="form-group"><label>🔗 视频链接</label><input id="uploadVideoLink" placeholder="https://..."></div>
      <div style="display:flex; gap:1rem;"><button class="btn" id="saveRecipeBtn">💾 保存菜谱</button><button class="btn" id="saveUploadAndBackBtn">📤 保存并返回主界面</button></div>
    </div>
  </div>

  <!-- 修改菜谱 -->
  <div id="editView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <h2>✏️ 修改菜谱</h2>
    <div id="editRecipeList" class="recipe-list"></div>
    <div id="editFormArea" style="display:none;"><div class="recipe-form">
      <input type="hidden" id="editIndex"><div><label>标题</label><input id="editTitle" maxlength="15"></div>
      <div><label>文字</label><textarea id="editText"></textarea></div>
      <div><label>更换图片 (≤5MB)</label><input type="file" id="editImage" accept="image/*"></div>
      <div><label>视频链接</label><input id="editVideoLink"></div>
      <div id="editMediaPreview" class="media-preview"></div>
      <div style="display:flex; gap:1rem;"><button class="btn" id="saveEditBtn">💾 保存</button><button class="btn" id="saveEditAndBackBtn">📤 保存并返回</button></div>
    </div></div>
  </div>

  <!-- 书视图 -->
  <div id="bookView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="book-spread"><div class="left-page">
      <div style="display:flex; justify-content:space-between;"><span>📚 目录</span><label class="btn-outline" style="cursor:pointer;">🖼️封面 (≤5MB)<input type="file" id="coverImageInput" accept="image/*" style="display:none;"></label></div>
      <img id="coverPreviewImg" class="cover-preview" style="display:none;"><ul id="directoryList"></ul>
      <button class="btn-outline" id="saveCoverBtn">💾 保存封面</button>
    </div><div class="right-page" id="recipeDetailPage"></div></div>
  </div>

  <!-- 社区（无需内嵌登录） -->
  <div id="communityView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="auth-panel">
      <span id="communityUserStatus">👤 未登录</span>
    </div>
    <div class="recipe-form">
      <h3>📢 分享菜谱到社区</h3>
      <input id="communityTitle" placeholder="标题 (15字内)" maxlength="15">
      <textarea id="communityText" rows="2" placeholder="描述..."></textarea>
      <div><label>🖼️ 图片 (≤5MB，可选)</label><input type="file" id="communityImage" accept="image/*"></div>
      <button class="btn" id="postToCommunityBtn">发布</button>
    </div>
    <div id="communityFeed"></div>
  </div>
</div>

<script>
  (function() {
    // 存储键
    const STORAGE_RECIPES = 'recipes_v3';
    const STORAGE_COMMUNITY = 'community_v3';
    const STORAGE_USERS = 'users_v3';
    const STORAGE_CURRENT_USER = 'currentUser_v3';
    const COVER_KEY = 'cover_v3';
    const SESSION_DAYS = 7;

    let currentUser = null;
    let recipes = [];
    let communityPosts = [];
    let coverImageData = null;

    // 根据用户ID生成存储键
    function userKey(base) { return currentUser ? `${base}_${currentUser.id}` : base; }
    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS) || '{}'); }
    function saveUsers(u) { localStorage.setItem(STORAGE_USERS, JSON.stringify(u)); }
    function loadUserData() {
      recipes = JSON.parse(localStorage.getItem(userKey(STORAGE_RECIPES)) || '[]');
      communityPosts = JSON.parse(localStorage.getItem(userKey(STORAGE_COMMUNITY)) || '[]');
      const savedCover = localStorage.getItem(userKey(COVER_KEY));
      coverImageData = savedCover || null;
    }
    function saveRecipes() { localStorage.setItem(userKey(STORAGE_RECIPES), JSON.stringify(recipes)); }
    function saveCommunity() { localStorage.setItem(userKey(STORAGE_COMMUNITY), JSON.stringify(communityPosts)); }
    function saveCover() { localStorage.setItem(userKey(COVER_KEY), coverImageData || ''); }

    // 工具函数
    function fileToBase64(file, maxMB = 5) {
      return new Promise((resolve, reject) => {
        if (file.size > maxMB * 1024 * 1024) {
          alert(`图片不能超过${maxMB}MB`);
          return reject('文件过大');
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function escapeHtml(t) { return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

    // 登录相关
    const loginScreen = document.getElementById('loginScreen');
    const appContainer = document.querySelector('.app-container');
    function updateLoginUI() {
      if (currentUser) {
        loginScreen.style.display = 'none';
        appContainer.style.display = '';
        loadUserData();
        renderEditList(); renderBook(); updateCommunityUI();
        document.getElementById('communityUserStatus').textContent = `👤 ${currentUser.id}`;
      } else {
        loginScreen.style.display = 'flex';
        appContainer.style.display = 'none';
      }
    }
    function checkSession() {
      const saved = localStorage.getItem(STORAGE_CURRENT_USER);
      if (saved) {
        const session = JSON.parse(saved);
        if (session.expire && Date.now() < session.expire) {
          currentUser = { id: session.id, password: session.password };
        } else {
          localStorage.removeItem(STORAGE_CURRENT_USER);
        }
      }
    }
    document.getElementById('loginGoBtn').addEventListener('click', () => {
      const id = document.getElementById('loginIdInput').value.trim();
      const pw = document.getElementById('loginPwInput').value.trim();
      if (!id || !pw) return alert('请输入账号密码');
      const users = getUsers();
      if (!users[id]) return alert('账号不存在');
      if (users[id].password !== pw) return alert('密码错误');
      currentUser = { id, password: pw };
      const expire = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000;
      localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify({ id, password: pw, expire }));
      updateLoginUI();
    });
    document.getElementById('regGoBtn').addEventListener('click', () => {
      const id = document.getElementById('loginIdInput').value.trim();
      const pw = document.getElementById('loginPwInput').value.trim();
      if (!id || !pw) return alert('请输入账号和密码');
      if (!/^\d{8}$/.test(pw)) return alert('密码需8位数字');
      const users = getUsers();
      if (users[id]) return alert('账号已存在');
      users[id] = { password: pw };
      saveUsers(users);
      alert('注册成功，请登录');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_CURRENT_USER);
      currentUser = null;
      updateLoginUI();
      document.getElementById('loginIdInput').value = '';
      document.getElementById('loginPwInput').value = '';
    });

    // 视图切换
    const views = {
      mainMenu: document.getElementById('mainMenu'),
      uploadView: document.getElementById('uploadView'),
      editView: document.getElementById('editView'),
      bookView: document.getElementById('bookView'),
      communityView: document.getElementById('communityView')
    };
    function showView(id) { Object.values(views).forEach(v => v.classList.remove('active')); if (views[id]) views[id].classList.add('active'); }
    document.querySelectorAll('.menu-card').forEach(c => c.addEventListener('click', () => showView(c.dataset.view)));
    document.querySelectorAll('.back-btn').forEach(b => b.addEventListener('click', () => showView('mainMenu')));

    // 上传菜谱（无视频文件）
    const uploadTitle = document.getElementById('uploadTitle'), uploadText = document.getElementById('uploadText');
    const uploadImage = document.getElementById('uploadImage'), uploadVideoLink = document.getElementById('uploadVideoLink');
    const imagePreview = document.getElementById('imagePreview');
    uploadImage.addEventListener('change', function() {
      imagePreview.innerHTML = '';
      if (this.files?.[0]) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(this.files[0]);
        imagePreview.appendChild(img);
      }
    });
    async function buildRecipeFromUpload() {
      const title = uploadTitle.value.trim();
      if (!title || title.length > 15) { alert('标题1-15字'); return null; }
      let imageData = null;
      if (uploadImage.files?.[0]) {
        try { imageData = await fileToBase64(uploadImage.files[0], 5); } catch (e) { return null; }
      }
      return {
        title,
        text: uploadText.value.trim(),
        image: imageData,
        video: null,
        videoLink: uploadVideoLink.value.trim()
      };
    }
    document.getElementById('saveRecipeBtn').addEventListener('click', async () => { const r = await buildRecipeFromUpload(); if (r) { recipes.push(r); saveRecipes(); alert('已保存'); } });
    document.getElementById('saveUploadAndBackBtn').addEventListener('click', async () => { const r = await buildRecipeFromUpload(); if (r) { recipes.push(r); saveRecipes(); showView('mainMenu'); } });

    // 修改菜谱
    const editList = document.getElementById('editRecipeList'), editForm = document.getElementById('editFormArea');
    const editIndex = document.getElementById('editIndex'), editTitle = document.getElementById('editTitle'), editText = document.getElementById('editText');
    const editImage = document.getElementById('editImage'), editVideoLink = document.getElementById('editVideoLink');
    const editMediaPreview = document.getElementById('editMediaPreview');
    function renderEditList() {
      editList.innerHTML = '';
      if (recipes.length === 0) { editList.innerHTML = '<p>暂无菜谱</p>'; return; }
      recipes.forEach((r, i) => {
        const d = document.createElement('div'); d.className = 'recipe-item';
        d.innerHTML = `<span>${escapeHtml(r.title)}</span><div><button data-edit="${i}" class="btn-outline">✎</button><button data-del="${i}" class="btn-outline btn-danger">🗑</button></div>`;
        editList.appendChild(d);
      });
      document.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', e => loadEdit(parseInt(b.dataset.edit))));
      document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', e => {
        if (confirm('确定删除？')) { recipes.splice(parseInt(b.dataset.del), 1); saveRecipes(); renderEditList(); }
      }));
    }
    function loadEdit(i) {
      const r = recipes[i]; editIndex.value = i; editTitle.value = r.title; editText.value = r.text; editVideoLink.value = r.videoLink || '';
      editMediaPreview.innerHTML = '';
      if (r.image) { const img = document.createElement('img'); img.src = r.image; editMediaPreview.appendChild(img); }
      editForm.style.display = 'block';
    }
    editImage.addEventListener('change', function() {
      if (this.files?.[0]) {
        const reader = new FileReader();
        reader.onload = e => { editMediaPreview.innerHTML = ''; const img = document.createElement('img'); img.src = e.target.result; editMediaPreview.appendChild(img); };
        reader.readAsDataURL(this.files[0]);
      }
    });
    async function saveEdit(back = false) {
      const i = parseInt(editIndex.value); if (isNaN(i)) return;
      const r = recipes[i]; r.title = editTitle.value.trim(); r.text = editText.value.trim(); r.videoLink = editVideoLink.value.trim();
      if (editImage.files?.[0]) {
        try { r.image = await fileToBase64(editImage.files[0], 5); } catch (e) { return; }
      }
      saveRecipes(); alert('已更新'); renderEditList(); editForm.style.display = 'none';
      if (back) showView('mainMenu');
    }
    document.getElementById('saveEditBtn').addEventListener('click', () => saveEdit(false));
    document.getElementById('saveEditAndBackBtn').addEventListener('click', () => saveEdit(true));

    // 书视图
    const dirList = document.getElementById('directoryList'), detailPage = document.getElementById('recipeDetailPage');
    const coverImg = document.getElementById('coverPreviewImg'), coverInput = document.getElementById('coverImageInput');
    function updateCoverDisplay() { if (coverImageData) { coverImg.src = coverImageData; coverImg.style.display = 'block'; } else { coverImg.style.display = 'none'; } }
    coverInput.addEventListener('change', async function() {
      if (this.files?.[0]) {
        try { coverImageData = await fileToBase64(this.files[0], 5); updateCoverDisplay(); } catch (e) {}
      }
    });
    document.getElementById('saveCoverBtn').addEventListener('click', () => { saveCover(); alert('封面已保存'); });
    function renderBook() {
      dirList.innerHTML = '';
      if (recipes.length === 0) { detailPage.innerHTML = '<p>暂无菜谱</p>'; return; }
      recipes.forEach((r, i) => {
        const li = document.createElement('li'); const b = document.createElement('button'); b.className = 'dir-link'; b.textContent = r.title;
        b.onclick = () => showDetail(i); li.appendChild(b); dirList.appendChild(li);
      });
      if (recipes.length > 0) showDetail(0);
    }
    function showDetail(i) {
      const r = recipes[i];
      detailPage.innerHTML = `<div class="recipe-detail"><h2>${escapeHtml(r.title)}</h2><p>${escapeHtml(r.text||'')}</p><div class="detail-media">${r.image?`<img src="${r.image}">`:''}${r.videoLink?`<a href="${r.videoLink}" target="_blank">📎 视频链接</a>`:''}</div></div>`;
    }

    // 社区
    function updateCommunityUI() {
      document.getElementById('communityUserStatus').textContent = currentUser ? `👤 ${currentUser.id}` : '未登录';
      renderCommunityFeed();
    }
    document.getElementById('postToCommunityBtn').addEventListener('click', async () => {
      if (!currentUser) return alert('请先登录');
      const title = document.getElementById('communityTitle').value.trim();
      if (!title || title.length > 15) return alert('标题需1-15字');
      let imageData = null;
      const imgFile = document.getElementById('communityImage').files?.[0];
      if (imgFile) {
        try { imageData = await fileToBase64(imgFile, 5); } catch (e) { return; }
      }
      communityPosts.unshift({
        id: Date.now().toString(),
        author: currentUser.id,
        title,
        text: document.getElementById('communityText').value.trim(),
        image: imageData,
        likes: [],
        timestamp: new Date().toISOString()
      });
      saveCommunity();
      document.getElementById('communityTitle').value = '';
      document.getElementById('communityText').value = '';
      document.getElementById('communityImage').value = '';
      renderCommunityFeed();
    });
    function renderCommunityFeed() {
      const feed = document.getElementById('communityFeed');
      feed.innerHTML = communityPosts.length ? '' : '<p>暂无分享</p>';
      communityPosts.forEach(p => {
        const liked = currentUser && p.likes.includes(currentUser.id);
        const card = document.createElement('div'); card.className = 'post-card';
        card.innerHTML = `
          <strong>${escapeHtml(p.title)}</strong> <span>by ${escapeHtml(p.author)}</span>
          <p>${escapeHtml(p.text)}</p>
          ${p.image ? `<img src="${p.image}" style="max-width:100%; border-radius:1rem;">` : ''}
          <div style="display:flex; gap:1rem; align-items:center;">
            <button class="like-btn">${liked?'❤️':'🤍'} ${p.likes.length}</button>
            <button class="btn-outline download-btn">📥下载到我的菜谱</button>
          </div>`;
        card.querySelector('.like-btn').addEventListener('click', () => {
          if (!currentUser) return alert('请登录');
          if (p.likes.includes(currentUser.id)) p.likes = p.likes.filter(u => u !== currentUser.id);
          else p.likes.push(currentUser.id);
          saveCommunity(); renderCommunityFeed();
        });
        card.querySelector('.download-btn').addEventListener('click', () => {
          recipes.push({ title: p.title, text: p.text, image: p.image || null, video: null, videoLink: '' });
          saveRecipes(); alert('已下载到我的菜谱');
        });
        feed.appendChild(card);
      });
    }

    // PWA 安装
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBanner').style.display = 'block'; });
    document.getElementById('installBanner').addEventListener('click', async () => {
      if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
      document.getElementById('installBanner').style.display = 'none';
    });

    // 初始化
    checkSession();
    updateLoginUI();
    // 视图刷新监听
    new MutationObserver(() => {
      if (views.editView.classList.contains('active')) renderEditList();
      if (views.bookView.classList.contains('active')) { updateCoverDisplay(); renderBook(); }
      if (views.communityView.classList.contains('active')) updateCommunityUI();
    }).observe(appContainer, { attributes: true, subtree: true, attributeFilter: ['class'] });

    // Service Worker 简单缓存
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(
          "self.addEventListener('install',e=>{e.waitUntil(caches.open('caicaipu').then(c=>c.addAll(['./'])));});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});"
        )).catch(() => {});
      });
    }
  })();
</script>
</body>
</html>
