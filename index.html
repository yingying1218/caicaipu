<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>菜菜谱 · 厨房小白的私房菜</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E8%8F%9C%E8%8F%9C%E8%B0%B1%22%2C%22short_name%22%3A%22%E8%8F%9C%E8%8F%9C%E8%B0%B1%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f9f3e9%22%2C%22theme_color%22%3A%22%23a77c52%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'48'%20fill%3D'%23a77c52'%2F%3E%3Ctext%20x%3D'50'%20y%3D'68'%20font-size%3D'52'%20text-anchor%3D'middle'%20fill%3D'white'%3E🍲%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="菜菜谱">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23a77c52'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white'>🍲</text></svg>">
  <meta name="theme-color" content="#a77c52">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f9f3e9;
      font-family: 'Segoe UI', 'Noto Serif SC', '楷体', KaiTi, '华文楷体', STKaiti, Georgia, serif;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      min-height: 100vh; padding: 1.5rem 1rem; color: #4a3b2f;
    }
    .app-container {
      max-width: 1100px; width: 100%; background: rgba(255,251,245,0.9);
      backdrop-filter: blur(16px); border-radius: 3rem; box-shadow: 0 25px 45px rgba(0,0,0,0.1);
      padding: 2rem 1.8rem; display: flex; flex-direction: column; gap: 2rem;
    }
    h1 { text-align: center; font-size: 2.8rem; font-weight: 400; letter-spacing: 6px; color: #5e3e1c; border-bottom: 2px dashed #d9b382; padding-bottom: 0.5rem; }
    .welcome-msg { text-align: center; font-size: 1.2rem; color: #7b5e3b; margin-top: -1rem; font-style: italic; }
    .menu-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
    .menu-card {
      background: #fff7ed; flex: 1 1 150px; min-width: 130px; border-radius: 2.5rem;
      padding: 2rem 1rem; text-align: center; cursor: pointer; border: 1px solid #ecdcc0;
      transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
    }
    .menu-card:hover { transform: translateY(-5px); background: #faead7; }
    .menu-icon { font-size: 2.8rem; background: #f7ede0; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .view { display: none; flex-direction: column; gap: 1.8rem; }
    .view.active { display: flex; }
    .back-btn { background: none; border: 1px solid #c8a27a; color: #5e3e1c; padding: 0.5rem 1.2rem; border-radius: 3rem; cursor: pointer; align-self: flex-start; }
    .recipe-form, .community-box { background: #fffaf2; padding: 1.8rem; border-radius: 2rem; border: 1px solid #eddcc9; display: flex; flex-direction: column; gap: 1.4rem; }
    input, textarea { background: #fefcf7; border: 1px solid #d6b690; border-radius: 1.2rem; padding: 0.8rem; font-family: inherit; }
    .btn { background: #a77c52; color: white; border: none; padding: 0.7rem 1.8rem; border-radius: 2.5rem; cursor: pointer; font-weight: bold; }
    .btn-outline { background: transparent; color: #5e3e1c; border: 1px solid #b1895c; }
    .btn-danger { background: #c47a5a; }
    .recipe-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .recipe-item { background: #fff6ea; border-radius: 1.5rem; padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e1c7a8; }
    .book-spread { display: flex; flex-wrap: wrap; background: #fef7e9; border-radius: 2rem; }
    .left-page, .right-page { flex: 1 1 280px; padding: 2rem; }
    .left-page { background: #fdf3e4; border-right: 1px dashed #c9aa7a; }
    .dir-link { background: none; border: none; color: #5e3e1c; text-decoration: underline; cursor: pointer; }
    .auth-panel { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; background: #f5ede1; padding: 1.2rem; border-radius: 2rem; }
    .post-card { background: #fffaf2; border-radius: 1.8rem; padding: 1.5rem; border: 1px solid #e2cfb0; }
    .install-banner { background: #e7d5bd; padding: 0.8rem 1.5rem; border-radius: 2rem; text-align: center; cursor: pointer; display: none; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="app-container">
  <div id="installBanner" class="install-banner">📲 点击安装菜菜谱到桌面，像App一样使用！</div>
  <h1>🍲 菜菜谱</h1>
  <p class="welcome-msg">叮～你的线上小厨房已上线！菜菜谱，专治“只会烧开水”的你。</p>

  <div id="mainMenu" class="view active">
    <div class="menu-grid">
      <div class="menu-card" data-view="uploadView"><div class="menu-icon">📤</div><span>上传菜谱</span></div>
      <div class="menu-card" data-view="editView"><div class="menu-icon">✏️</div><span>修改菜谱</span></div>
      <div class="menu-card" data-view="bookView"><div class="menu-icon">📖</div><span>查看菜谱</span></div>
      <div class="menu-card" data-view="communityView"><div class="menu-icon">🌍</div><span>共享社区</span></div>
    </div>
  </div>

  <div id="uploadView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="recipe-form">
      <h2>📥 新建菜谱</h2>
      <div><label>🏷️ 标题</label><input id="uploadTitle" maxlength="15" placeholder="外婆的红烧肉"></div>
      <div><label>📝 文字</label><textarea id="uploadText" rows="3"></textarea></div>
      <div><label>🖼️ 图片</label><input type="file" id="uploadImage" accept="image/*"><div id="imagePreview" class="media-preview"></div></div>
      <div><label>🎬 视频</label><input type="file" id="uploadVideo" accept="video/*"><div id="videoPreview" class="media-preview"></div></div>
      <div><label>🔗 视频链接</label><input id="uploadVideoLink"></div>
      <div style="display:flex; gap:1rem;"><button class="btn" id="saveRecipeBtn">💾 保存</button><button class="btn" id="saveUploadAndBackBtn">📤 保存并返回</button></div>
    </div>
  </div>

  <div id="editView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <h2>✏️ 修改菜谱</h2>
    <div id="editRecipeList" class="recipe-list"></div>
    <div id="editFormArea" style="display:none;"><div class="recipe-form">
      <input type="hidden" id="editIndex"><div><label>标题</label><input id="editTitle" maxlength="15"></div>
      <div><label>文字</label><textarea id="editText"></textarea></div>
      <div><label>图片</label><input type="file" id="editImage" accept="image/*"></div>
      <div><label>视频</label><input type="file" id="editVideo" accept="video/*"></div>
      <div><label>视频链接</label><input id="editVideoLink"></div>
      <div id="editMediaPreview" class="media-preview"></div>
      <div style="display:flex; gap:1rem;"><button class="btn" id="saveEditBtn">💾 保存</button><button class="btn" id="saveEditAndBackBtn">📤 保存并返回</button></div>
    </div></div>
  </div>

  <div id="bookView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div class="book-spread"><div class="left-page">
      <div style="display:flex; justify-content:space-between;"><span>📚 目录</span><label class="btn-outline" style="cursor:pointer;">🖼️封面<input type="file" id="coverImageInput" accept="image/*" style="display:none;"></label></div>
      <img id="coverPreviewImg" class="cover-preview" style="display:none;"><ul id="directoryList"></ul>
      <button class="btn-outline" id="saveCoverBtn">💾 保存封面</button>
    </div><div class="right-page" id="recipeDetailPage"></div></div>
  </div>

  <div id="communityView" class="view">
    <button class="back-btn" data-back="mainMenu">← 返回</button>
    <div id="authSection" class="auth-panel">
      <input id="userIdInput" placeholder="ID" maxlength="12"><input type="password" id="passwordInput" placeholder="8位数字密码" maxlength="8">
      <button class="btn" id="registerBtn">注册</button><button class="btn" id="loginBtn">登录</button><span id="userStatus"></span>
    </div>
    <div id="communityContent" style="display:none;">
      <div class="recipe-form"><input id="communityTitle" placeholder="标题" maxlength="15"><textarea id="communityText"></textarea><button class="btn" id="postToCommunityBtn">发布</button></div>
      <div id="communityFeed"></div>
    </div>
  </div>
</div>

<script>
  (function() {
    // PWA 安装逻辑
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').style.display = 'block';
    });
    document.getElementById('installBanner').addEventListener('click', async () => {
      if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; deferredPrompt = null; }
      document.getElementById('installBanner').style.display = 'none';
    });

    // 数据存储
    const STORAGE_RECIPES = 'family_recipes_v2', STORAGE_USERS = 'caicaipu_users', STORAGE_COMMUNITY = 'caicaipu_community', STORAGE_CURRENT_USER = 'caicaipu_current_user', COVER_KEY = 'family_cookbook_cover';
    let recipes = [], communityPosts = [], currentUser = null, coverImageData = null;
    function loadData() {
      recipes = JSON.parse(localStorage.getItem(STORAGE_RECIPES) || '[]');
      communityPosts = JSON.parse(localStorage.getItem(STORAGE_COMMUNITY) || '[]');
      const savedUser = localStorage.getItem(STORAGE_CURRENT_USER);
      if (savedUser) currentUser = JSON.parse(savedUser);
      const savedCover = localStorage.getItem(COVER_KEY);
      if (savedCover) coverImageData = savedCover;
    }
    function saveRecipes() { localStorage.setItem(STORAGE_RECIPES, JSON.stringify(recipes)); }
    function saveCommunity() { localStorage.setItem(STORAGE_COMMUNITY, JSON.stringify(communityPosts)); }
    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS) || '{}'); }
    function saveUsers(u) { localStorage.setItem(STORAGE_USERS, JSON.stringify(u)); }
    function fileToBase64(file) { return new Promise((resolve) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.readAsDataURL(file); }); }
    function escapeHtml(t) { return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

    // 视图切换
    const views = { mainMenu: document.getElementById('mainMenu'), uploadView: document.getElementById('uploadView'), editView: document.getElementById('editView'), bookView: document.getElementById('bookView'), communityView: document.getElementById('communityView') };
    function showView(id) { Object.values(views).forEach(v => v.classList.remove('active')); if (views[id]) views[id].classList.add('active'); }
    document.querySelectorAll('.menu-card').forEach(c => c.addEventListener('click', () => showView(c.dataset.view)));
    document.querySelectorAll('.back-btn').forEach(b => b.addEventListener('click', () => showView('mainMenu')));

    // 上传
    async function buildRecipe() { const t = document.getElementById('uploadTitle').value.trim(); if (!t || t.length>15) return null; return { title: t, text: document.getElementById('uploadText').value.trim(), image: document.getElementById('uploadImage').files[0] ? await fileToBase64(document.getElementById('uploadImage').files[0]) : null, video: document.getElementById('uploadVideo').files[0] ? await fileToBase64(document.getElementById('uploadVideo').files[0]) : null, videoLink: document.getElementById('uploadVideoLink').value.trim() }; }
    document.getElementById('saveRecipeBtn').addEventListener('click', async () => { const r = await buildRecipe(); if (r) { recipes.push(r); saveRecipes(); alert('已保存'); } });
    document.getElementById('saveUploadAndBackBtn').addEventListener('click', async () => { const r = await buildRecipe(); if (r) { recipes.push(r); saveRecipes(); showView('mainMenu'); } });

    // 修改
    function renderEditList() {
      document.getElementById('editRecipeList').innerHTML = recipes.length ? '' : '<p>暂无菜谱</p>';
      recipes.forEach((r,i) => { const d=document.createElement('div'); d.className='recipe-item'; d.innerHTML=`<span>${escapeHtml(r.title)}</span><div><button data-edit="${i}" class="btn-outline">✎</button><button data-del="${i}" class="btn-outline btn-danger">🗑</button></div>`; document.getElementById('editRecipeList').appendChild(d); });
      document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{ const i=parseInt(b.dataset.edit); const r=recipes[i]; document.getElementById('editIndex').value=i; document.getElementById('editTitle').value=r.title; document.getElementById('editText').value=r.text; document.getElementById('editVideoLink').value=r.videoLink||''; document.getElementById('editFormArea').style.display='block'; }));
      document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{ if(confirm('删除？')){ recipes.splice(parseInt(b.dataset.del),1); saveRecipes(); renderEditList(); } }));
    }
    async function saveEdit(back=false) { const i=parseInt(document.getElementById('editIndex').value); if(isNaN(i)) return; const r=recipes[i]; r.title=document.getElementById('editTitle').value.trim(); r.text=document.getElementById('editText').value.trim(); r.videoLink=document.getElementById('editVideoLink').value.trim(); if(document.getElementById('editImage').files[0]) r.image=await fileToBase64(document.getElementById('editImage').files[0]); if(document.getElementById('editVideo').files[0]) r.video=await fileToBase64(document.getElementById('editVideo').files[0]); saveRecipes(); renderEditList(); document.getElementById('editFormArea').style.display='none'; if(back) showView('mainMenu'); }
    document.getElementById('saveEditBtn').addEventListener('click', ()=>saveEdit(false));
    document.getElementById('saveEditAndBackBtn').addEventListener('click', ()=>saveEdit(true));

    // 书
    function renderBook() { document.getElementById('directoryList').innerHTML=''; if(!recipes.length) return; recipes.forEach((r,i)=>{ const li=document.createElement('li'); const b=document.createElement('button'); b.className='dir-link'; b.textContent=r.title; b.onclick=()=>{ document.getElementById('recipeDetailPage').innerHTML=`<div class="recipe-detail"><h2>${escapeHtml(r.title)}</h2><p>${escapeHtml(r.text||'')}</p>${r.image?`<img src="${r.image}" style="max-width:100%;">`:''}${r.video?`<video src="${r.video}" controls></video>`:''}</div>`; }; li.appendChild(b); document.getElementById('directoryList').appendChild(li); }); }
    document.getElementById('coverImageInput').addEventListener('change', function(){ if(this.files[0]){ const r=new FileReader(); r.onload=e=>{ coverImageData=e.target.result; document.getElementById('coverPreviewImg').src=coverImageData; document.getElementById('coverPreviewImg').style.display='block'; }; r.readAsDataURL(this.files[0]); } });
    document.getElementById('saveCoverBtn').addEventListener('click', ()=>{ localStorage.setItem(COVER_KEY, coverImageData||''); alert('封面已保存'); });

    // 社区
    function updateCommUI() {
      if (currentUser) { document.getElementById('authSection').style.display='none'; document.getElementById('communityContent').style.display='block'; document.getElementById('userStatus').textContent=`👤 ${currentUser.id}`; renderFeed(); }
      else { document.getElementById('authSection').style.display='flex'; document.getElementById('communityContent').style.display='none'; }
    }
    document.getElementById('registerBtn').addEventListener('click', ()=>{
      const id=document.getElementById('userIdInput').value.trim(), pw=document.getElementById('passwordInput').value.trim();
      if(!id||!pw) return alert('填写完整'); if(!/^\d{8}$/.test(pw)) return alert('密码需8位数字');
      const users=getUsers(); if(users[id]) return alert('ID已存在'); users[id]={password:pw}; saveUsers(users); alert('注册成功');
    });
    document.getElementById('loginBtn').addEventListener('click', ()=>{
      const id=document.getElementById('userIdInput').value.trim(), pw=document.getElementById('passwordInput').value.trim();
      const users=getUsers(); if(!users[id]) return alert('ID不存在'); if(users[id].password!==pw) return alert('密码错误');
      currentUser={id,pw}; localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify(currentUser)); updateCommUI();
    });
    document.getElementById('postToCommunityBtn').addEventListener('click', ()=>{
      if(!currentUser) return; const t=document.getElementById('communityTitle').value.trim(); if(!t) return;
      communityPosts.unshift({id:Date.now().toString(),author:currentUser.id,title:t,text:document.getElementById('communityText').value.trim(),likes:[]}); saveCommunity(); renderFeed();
    });
    function renderFeed() {
      document.getElementById('communityFeed').innerHTML = communityPosts.length ? '' : '<p>暂无分享</p>';
      communityPosts.forEach(p=>{ const liked=currentUser&&p.likes.includes(currentUser.id); const card=document.createElement('div'); card.className='post-card';
        card.innerHTML=`<strong>${escapeHtml(p.title)}</strong> by ${escapeHtml(p.author)}<p>${escapeHtml(p.text)}</p><div><button class="like-btn">${liked?'❤️':'🤍'} ${p.likes.length}</button><button class="btn-outline download-btn">📥下载</button></div>`;
        card.querySelector('.like-btn').addEventListener('click',()=>{ if(!currentUser) return; if(p.likes.includes(currentUser.id)) p.likes=p.likes.filter(u=>u!==currentUser.id); else p.likes.push(currentUser.id); saveCommunity(); renderFeed(); });
        card.querySelector('.download-btn').addEventListener('click',()=>{ recipes.push({title:p.title,text:p.text,image:null,video:null,videoLink:''}); saveRecipes(); alert('已下载'); });
        document.getElementById('communityFeed').appendChild(card);
      });
    }

    // 初始化
    loadData();
    renderEditList(); renderBook(); updateCommUI();
    new MutationObserver(()=>{ if(views.editView.classList.contains('active')) renderEditList(); if(views.bookView.classList.contains('active')) renderBook(); if(views.communityView.classList.contains('active')) updateCommUI(); }).observe(document.querySelector('.app-container'),{attributes:true,subtree:true,attributeFilter:['class']});

    // Service Worker 注册 (PWA 离线缓存)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(
          "self.addEventListener('install',e=>{e.waitUntil(caches.open('caicaipu').then(c=>c.addAll(['./'])));});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});"
        )).catch(() => {});
      });
    }
  })();
</script>
</body>
</html>
